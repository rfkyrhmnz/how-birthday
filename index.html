<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/how-birthday/Untitled design (47).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="A handcrafted birthday scrapbook for Cindy — 04 Juni 🌸" />
    <title>Happy Birthday, Cindy 🌸</title>

    <!-- Preload critical assets — browser fetches these before JS even runs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="preload" as="image" href="/how-birthday/images/crumpled_pink_newspaper.png" />
    <link rel="preload" as="image" href="/how-birthday/images/Untitled%20design%20(83).png" />
    <link rel="preload" as="image" href="/how-birthday/images/Untitled%20design%20(84).png" />
    <link rel="preload" as="image" href="/how-birthday/images/Untitled%20design%20(85).png" />
    <link rel="preload" as="image" href="/how-birthday/images/Untitled%20design%20(86).png" />
    <link rel="preload" as="image" href="/how-birthday/images/Untitled%20design%20(87).png" />
    <link rel="preload" as="image" href="/how-birthday/images/Untitled%20design.webp" />
    <link rel="preload" as="audio" href="/how-birthday/music/shape-of-my-heart.mp3" />

    <style>
      /* ── Instant loading screen — shown before React mounts ── */
      #html-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fdf0f4 0%, #f5dde6 100%);
        transition: opacity 0.6s ease;
      }

      #html-loader .loader-petal {
        width: 56px;
        height: 56px;
        position: relative;
        margin-bottom: 24px;
      }

      #html-loader .loader-petal::before,
      #html-loader .loader-petal::after {
        content: '';
        position: absolute;
        border: 3px solid transparent;
        border-radius: 50%;
      }

      #html-loader .loader-petal::before {
        inset: 0;
        border-top-color: #cfa7b3;
        animation: spin 1s linear infinite;
      }

      #html-loader .loader-petal::after {
        inset: 8px;
        border-top-color: #e8c4cf;
        animation: spin 0.7s linear infinite reverse;
      }

      #html-loader .loader-emoji {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 20px;
        animation: pulse 1.4s ease-in-out infinite;
      }

      #html-loader .loader-text {
        font-family: 'Quicksand', 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #b38c97;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        animation: pulse 1.4s ease-in-out infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 1;   }
      }

      /* Hide scrollbar during load */
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <!-- Loading screen — removed by React after first render -->
    <div id="html-loader">
      <div class="loader-petal">
        <span class="loader-emoji">🌸</span>
      </div>
      <p class="loader-text">Loading…</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
